name: Production Release Build

on:
  workflow_dispatch:

  push:
    branches:
      - '**'

  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

env:
  APP_NAME: ses-contact-app
  IMAGE_NAME: ses-app

jobs:
  production-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Tag Condition
        run: |
          echo "Event name: ${{ github.event_name }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Commit message: ${{ github.event.head_commit.message }}"

            if echo "${{ github.event.head_commit.message }}" | grep -qi "production release"; then
              echo "CREATE_TAG=true" >> $GITHUB_ENV
            else
              echo "CREATE_TAG=false" >> $GITHUB_ENV
            fi

          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR title: ${{ github.event.pull_request.title }}"

            if [ "${{ github.event.pull_request.merged }}" = "true" ] && echo "${{ github.event.pull_request.title }}" | grep -qi "production release"; then
              echo "CREATE_TAG=true" >> $GITHUB_ENV
            else
              echo "CREATE_TAG=false" >> $GITHUB_ENV
            fi

          else
            echo "Manual run detected. Build will run but tag will not be created."
            echo "CREATE_TAG=false" >> $GITHUB_ENV
          fi

          echo "TAG_NAME=prod-v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create Git Tag Before Build
        if: env.CREATE_TAG == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag -a "$TAG_NAME" -m "Production release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$TAG_NAME .

      - name: Verify .env File
        run: |
          ls -la
          test -f .env && echo ".env file found" || echo ".env file missing"

      - name: Deploy Container
        run: |
          docker stop $APP_NAME || true
          docker rm $APP_NAME || true

          docker run -d \
            --name $APP_NAME \
            -p 3000:3000 \
            --env-file .env \
            $IMAGE_NAME:$TAG_NAME

      - name: Debug Container
        run: |
          docker ps
          docker ps -a

      - name: Follow Logs For 60 Seconds
        run: |
          timeout 60 docker logs -f $APP_NAME || true

      - name: Final Logs
        run: |
          docker logs --tail 100 $APP_NAME || true
