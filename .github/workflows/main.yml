name: Production Release Build

on:
  workflow_dispatch:

  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

env:
  APP_NAME: ses-contact-app
  IMAGE_NAME: ses-app

jobs:
  production-release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.title, 'production release')
      )

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git Tag Before Build
        run: |
          TAG_NAME="prod-v1.0.${{ github.run_number }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag -a "$TAG_NAME" -m "Production release $TAG_NAME"
          git push origin "$TAG_NAME"

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$TAG_NAME .

      - name: Verify .env File
        run: |
          ls -la
          test -f .env && echo ".env file found" || echo ".env file missing"

      - name: Deploy Container
        run: |
          docker stop $APP_NAME || true
          docker rm $APP_NAME || true

          docker run -d \
            --name $APP_NAME \
            -p 3000:3000 \
            --env-file .env \
            $IMAGE_NAME:$TAG_NAME

      - name: Debug Container
        run: |
          echo "===== RUNNING CONTAINERS ====="
          docker ps

          echo "===== ALL CONTAINERS ====="
          docker ps -a

      - name: Show Container Logs
        run: |
          docker logs $APP_NAME || true

      - name: Follow Logs For 60 Seconds
        run: |
          timeout 60 docker logs -f $APP_NAME || true

      - name: Final Status
        run: |
          echo "===== FINAL CONTAINER STATUS ====="
          docker ps -a

          echo "===== FINAL LOGS ====="
          docker logs $APP_NAME || true
